<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>النهوض</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #6366f1;
            --accent: #10b981;
            --danger: #f43f5e;
            --text: #f8fafc;
            --input-bg: rgba(255,255,255,0.05);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 500px; }

        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .cycle-timer { font-family: monospace; font-size: 3.2rem; color: var(--accent); font-weight: bold; }
        .main-days { font-size: 4.5rem; font-weight: 900; color: var(--primary); line-height: 1; }

        .grid-stats {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
            margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;
        }

        input[type="date"], textarea {
            width: 100%; background: var(--input-bg); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; color: white; padding: 12px; box-sizing: border-box; font-family: inherit; margin-bottom: 10px;
        }

        .btn {
            width: 100%; padding: 14px; border-radius: 12px; border: none;
            font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1rem; margin: 5px 0;
        }

        .btn-start { background: var(--primary); color: white; }
        .btn-relapse { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
        .btn-restart-soft { background: #334155; color: #cbd5e1; border: 1px solid #475569; font-size: 0.85rem; }
        
        .toggle-diary-btn {
            width: 100%; background: #1e293b; color: var(--primary); border: 1px solid var(--primary);
            padding: 12px; border-radius: 12px; cursor: pointer; font-weight: bold;
            display: flex; justify-content: space-between; align-items: center; margin-top: 10px;
        }

        #diaryList { display: none; margin-top: 15px; }

        .diary-item {
            text-align: right; background: rgba(255,255,255,0.03);
            padding: 15px; border-radius: 12px; margin-top: 10px;
            border-right: 4px solid var(--primary); position: relative;
        }

        .diary-actions {
            display: flex; gap: 10px; margin-top: 10px; justify-content: flex-end;
        }

        .action-btn {
            font-size: 0.8rem; cursor: pointer; padding: 5px 10px; border-radius: 6px; border: none;
        }
        .edit-btn { background: var(--primary); color: white; }
        .delete-btn { background: var(--danger); color: white; }

        .backup-section {
            margin-top: 20px; padding-top: 15px; border-top: 1px dashed rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div style="font-size: 0.8rem; opacity: 0.7;">الوقت</div>
        <div class="cycle-timer" id="countdown">24:00:00</div>
    </div>

    <div class="card">
        <div style="font-size: 0.8rem; opacity: 0.7;">ايام الصمود</div>
        <div class="main-days" id="daysDisplay">0</div>
        <div class="grid-stats">
            <div><small>الايام المتبقية</small><br><b id="daysRemainingDisplay">--</b></div>
            <div><small>الزلات</small><br><b id="relapseDisplay" style="color:var(--danger)">0</b></div>
        </div>
    </div>

    <div class="card">
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <input type="date" id="startDateInput">
            <input type="date" id="endDateInput">
        </div>
        <button class="btn btn-start" onclick="startJourney()">🚀 بدء الرحلة</button>
        <button class="btn btn-restart-soft" onclick="restartJourneyOnly()">🔄 رحلة جديدة (تصفير الأرقام)</button>
        
        <textarea id="diaryInput" placeholder="اكتب تدوينة اليوم..."></textarea>
        <button class="btn" style="background:var(--accent); color:white;" onclick="saveDiary()">حفظ التدوينة</button>
        <button class="btn btn-relapse" onclick="addRelapse()">تسجيل زلة</button>

        <button class="toggle-diary-btn" onclick="toggleDiaries()">
            <span>📚 استعراض المذكرات السابقة</span>
            <span id="toggleIcon">▼</span>
        </button>

        <div id="diaryList"></div>
        
        <button class="btn" style="background:#1e293b; color:var(--danger); font-size:0.7rem; margin-top:20px;" onclick="resetAll()">تصفير شامل (حذف كل شيء)</button>

        <div class="backup-section">
            <p style="font-size: 0.7rem; opacity: 0.6; margin-bottom: 10px;">إدارة البيانات للنسخ الاحتياطي</p>
            <div style="display: flex; gap: 10px;">
                <button class="btn" style="background:#059669; color:white; font-size:0.75rem; padding: 10px;" onclick="exportData()">📥 تصدير ملف</button>
                <button class="btn" style="background:#4b5563; color:white; font-size:0.75rem; padding: 10px;" onclick="importData()">📤 استعادة ملف</button>
            </div>
        </div>
    </div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('recoveryFullSet')) || {
        relapses: 0, start: "", end: "", startTimeMs: null, isRunning: false
    };
    let diaries = JSON.parse(localStorage.getItem('diariesFullSet')) || [];

    const CYCLE_MS = 86400000; // دورة 10 ثوانٍ
    const DAY_MS = 86400000;

    if(data.start) document.getElementById('startDateInput').value = data.start;
    if(data.end) document.getElementById('endDateInput').value = data.end;

    function startJourney() {
        data.start = document.getElementById('startDateInput').value;
        data.end = document.getElementById('endDateInput').value;
        if(!data.start || !data.end) { alert("يرجى تحديد التواريخ!"); return; }
        data.startTimeMs = new Date().getTime();
        data.isRunning = true;
        save();
        update();
    }

    function update() {
        if (!data.isRunning || !data.startTimeMs) return;
        
        const now = new Date().getTime();
        const startMs = new Date(data.start).getTime();
        const endMs = new Date(data.end).getTime();

        // 1. حساب إجمالي الأيام كهدف (قيمة ثابتة للبداية)
        const totalTargetDays = Math.ceil((endMs - startMs) / DAY_MS);

        // 2. حساب المنقضي: الدورات المكتملة منذ الضغط على زر البدء
        const msPassedSinceClick = now - data.startTimeMs;
        const cyclesPassed = Math.floor(msPassedSinceClick / CYCLE_MS);
        document.getElementById('daysDisplay').innerText = cyclesPassed;

        // 3. حساب المتبقي (علاقة عكسية): الهدف الكلي ناقص المنقضي
        const currentRemaining = Math.max(0, totalTargetDays - cyclesPassed);
        document.getElementById('daysRemainingDisplay').innerText = currentRemaining;

        // 4. شرط الإيقاف: إذا وصل المتبقي للصفر
        if (currentRemaining <= 0) {
            data.isRunning = false;
            document.getElementById('countdown').innerText = "00:00:00";
            document.getElementById('daysRemainingDisplay').innerText = "🎉";
            save();
            return;
        }

        // التعديل: تحديث عداد الدورة ليدعم الساعات والدقائق والثواني (24 ساعة)
        const msRemainingInCycle = CYCLE_MS - (msPassedSinceClick % CYCLE_MS);
        const h = Math.floor(msRemainingInCycle / 3600000);
        const m = Math.floor((msRemainingInCycle % 3600000) / 60000);
        const s = Math.floor((msRemainingInCycle % 60000) / 1000);

        document.getElementById('countdown').innerText = 
            `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

        document.getElementById('relapseDisplay').innerText = data.relapses;
    }

    // بقية الدوال دون أي تغيير
    function toggleDiaries() {
        const list = document.getElementById('diaryList');
        const icon = document.getElementById('toggleIcon');
        if (list.style.display === "none" || list.style.display === "") {
            list.style.display = "block"; icon.innerText = "▲"; renderDiaries();
        } else {
            list.style.display = "none"; icon.innerText = "▼";
        }
    }

    function saveDiary() {
        const text = document.getElementById('diaryInput').value.trim();
        if(!text) return;
        diaries.unshift({ id: Date.now(), date: new Date().toLocaleString('ar-SA'), content: text });
        localStorage.setItem('diariesFullSet', JSON.stringify(diaries));
        document.getElementById('diaryInput').value = "";
        document.getElementById('diaryList').style.display = "block";
        document.getElementById('toggleIcon').innerText = "▲";
        renderDiaries();
    }

    function renderDiaries() {
        const list = document.getElementById('diaryList');
        if (diaries.length === 0) {
            list.innerHTML = "<p style='font-size:0.8rem; opacity:0.5;'>لا توجد مذكرات محفوظة بعد.</p>";
            return;
        }
        list.innerHTML = diaries.map(d => `
            <div class="diary-item">
                <small style="color:var(--primary)">${d.date}</small>
                <div style="margin-top:8px; line-height:1.6; font-size:0.95rem;">${d.content}</div>
                <div class="diary-actions">
                    <button class="action-btn edit-btn" onclick="editDiary(${d.id})">تعديل</button>
                    <button class="action-btn delete-btn" onclick="deleteDiary(${d.id})">حذف</button>
                </div>
            </div>
        `).join('');
    }

    function deleteDiary(id) {
        if(confirm("هل تريد حذف هذه التدوينة؟")) {
            diaries = diaries.filter(d => d.id !== id);
            localStorage.setItem('diariesFullSet', JSON.stringify(diaries));
            renderDiaries();
        }
    }

    function editDiary(id) {
        const item = diaries.find(d => d.id === id);
        const newText = prompt("تعديل التدوينة:", item.content);
        if (newText !== null && newText.trim() !== "") {
            item.content = newText.trim();
            localStorage.setItem('diariesFullSet', JSON.stringify(diaries));
            renderDiaries();
        }
    }

    function addRelapse() { data.relapses++; save(); update(); }
    function save() { localStorage.setItem('recoveryFullSet', JSON.stringify(data)); }
    
    function restartJourneyOnly() {
        if(confirm("تصفير الأرقام؟")) {
            data.relapses = 0; data.start = ""; data.end = ""; data.startTimeMs = null; data.isRunning = false;
            save(); location.reload();
        }
    }

    function resetAll() {
        if(confirm("حذف كل شيء؟")) { localStorage.clear(); location.reload(); }
    }

    function exportData() {
        const backup = { stats: data, diaries: diaries };
        const blob = new Blob([JSON.stringify(backup)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `recovery_backup.json`; a.click();
    }

    function importData() {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = '.json';
        input.onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => {
                const content = JSON.parse(ev.target.result);
                localStorage.setItem('recoveryFullSet', JSON.stringify(content.stats));
                localStorage.setItem('diariesFullSet', JSON.stringify(content.diaries));
                location.reload();
            }
            reader.readAsText(e.target.files[0]);
        }
        input.click();
    }

    setInterval(update, 1000);
    if(data.isRunning) update();
</script>
</body>
</html>
