<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الصمود السحابي | مذكرات ذكية</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #6366f1;
            --accent: #10b981;
            --danger: #f43f5e;
            --text: #f8fafc;
            --input-bg: rgba(255,255,255,0.05);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 500px; }

        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .cycle-timer { font-family: monospace; font-size: 3.2rem; color: var(--accent); font-weight: bold; }
        .main-days { font-size: 4.5rem; font-weight: 900; color: var(--primary); line-height: 1; }

        .grid-stats {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
            margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;
        }

        input[type="date"], textarea {
            width: 100%; background: var(--input-bg); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; color: white; padding: 12px; box-sizing: border-box; font-family: inherit; margin-bottom: 10px;
        }

        .btn {
            width: 100%; padding: 14px; border-radius: 12px; border: none;
            font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1rem; margin: 5px 0;
        }

        .btn-start { background: var(--primary); color: white; }
        .btn-relapse { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
        .btn-restart-soft { background: #334155; color: #cbd5e1; border: 1px solid #475569; font-size: 0.85rem; }
        
        .diary-item {
            text-align: right; background: rgba(255,255,255,0.03);
            padding: 15px; border-radius: 12px; margin-top: 15px;
            border-right: 4px solid var(--primary); position: relative;
        }

        .diary-actions {
            display: flex; gap: 10px; margin-top: 10px; justify-content: flex-end;
        }

        .action-btn {
            font-size: 0.8rem; cursor: pointer; padding: 5px 10px; border-radius: 6px; border: none;
        }
        .edit-btn { background: var(--primary); color: white; }
        .delete-btn { background: var(--danger); color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div style="font-size: 0.8rem; opacity: 0.7;">دورة الـ 24 ساعة</div>
        <div class="cycle-timer" id="countdown">24:00:00</div>
    </div>

    <div class="card">
        <div style="font-size: 0.8rem; opacity: 0.7;">أيام الصمود</div>
        <div class="main-days" id="daysDisplay">0</div>
        <div class="grid-stats">
            <div><small>المتبقي للهدف</small><br><b id="daysRemainingDisplay">--</b></div>
            <div><small>الزلات</small><br><b id="relapseDisplay" style="color:var(--danger)">0</b></div>
        </div>
    </div>

    <div class="card">
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <input type="date" id="startDateInput">
            <input type="date" id="endDateInput">
        </div>
        <button class="btn btn-start" id="startBtn">🚀 بدء / تحديث الرحلة</button>
        <button class="btn btn-restart-soft" id="restartBtn">🔄 رحلة جديدة (تصفير شامل)</button>
        
        <textarea id="diaryInput" placeholder="اكتب تدوينة اليوم..."></textarea>
        <button class="btn" style="background:var(--accent); color:white;" id="saveDiaryBtn">حفظ التدوينة</button>
        <button class="btn btn-relapse" id="relapseBtn">تسجيل زلة</button>
    </div>

    <div id="diaryList"></div>
</div>

<script type="module">
    // 1. استيراد المكتبات
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // 2. إعدادات Firebase الخاصة بك
    const firebaseConfig = {
        apiKey: "AIzaSyBxuH8sT_45q2DEZIL554Q5xr3c12ztywc",
        authDomain: "my-trck.firebaseapp.com",
        databaseURL: "https://my-trck-default-rtdb.firebaseio.com",
        projectId: "my-trck",
        storageBucket: "my-trck.firebasestorage.app",
        messagingSenderId: "221849606859",
        appId: "1:221849606859:web:29f1eeb7728b027107594e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const dataRef = ref(db, 'recoveryData');
    const diariesRef = ref(db, 'diaries');

    let localData = { relapses: 0, start: "", end: "", startTimeMs: null, isRunning: false };
    let localDiaries = [];

    // مزامنة البيانات من السحاب
    onValue(dataRef, (snapshot) => {
        const cloudData = snapshot.val();
        if (cloudData) {
            localData = cloudData;
            document.getElementById('startDateInput').value = localData.start || "";
            document.getElementById('endDateInput').value = localData.end || "";
            updateUI();
        }
    });

    onValue(diariesRef, (snapshot) => {
        const cloudDiaries = snapshot.val();
        localDiaries = cloudDiaries ? Object.values(cloudDiaries).reverse() : [];
        renderDiaries();
    });

    function updateUI() {
        if (!localData.isRunning || !localData.startTimeMs) return;
        const now = new Date().getTime();
        
        const start = new Date(localData.start).getTime();
        const diffStart = now - start;
        document.getElementById('daysDisplay').innerText = Math.max(0, Math.floor(diffStart / 86400000));

        const msIn24h = 24 * 60 * 60 * 1000;
        const msPassedSinceClick = now - localData.startTimeMs;
        const msRemainingInCycle = msIn24h - (msPassedSinceClick % msIn24h);
        
        const h = Math.floor(msRemainingInCycle / 3600000);
        const m = Math.floor((msRemainingInCycle % 3600000) / 60000);
        const s = Math.floor((msRemainingInCycle % 60000) / 1000);

        document.getElementById('countdown').innerText = 
            `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

        const end = new Date(localData.end).getTime();
        const diffEnd = Math.ceil((end - now) / 86400000);
        document.getElementById('daysRemainingDisplay').innerText = diffEnd > 0 ? diffEnd : "🎉";
        document.getElementById('relapseDisplay').innerText = localData.relapses;
    }

    document.getElementById('startBtn').onclick = () => {
        localData.start = document.getElementById('startDateInput').value;
        localData.end = document.getElementById('endDateInput').value;
        localData.startTimeMs = new Date().getTime();
        localData.isRunning = true;
        set(dataRef, localData);
    };

    document.getElementById('relapseBtn').onclick = () => {
        localData.relapses++;
        set(dataRef, localData);
    };

    document.getElementById('saveDiaryBtn').onclick = () => {
        const text = document.getElementById('diaryInput').value.trim();
        if(!text) return;
        const id = Date.now();
        const newDiary = { id, date: new Date().toLocaleString('ar-SA'), content: text };
        set(ref(db, 'diaries/' + id), newDiary);
        document.getElementById('diaryInput').value = "";
    };

    document.getElementById('restartBtn').onclick = () => {
        if(confirm("تصفير العداد والمذكرات؟")) {
            set(dataRef, { relapses: 0, start: "", end: "", startTimeMs: null, isRunning: false });
            set(diariesRef, null);
        }
    };

    window.deleteDiary = (id) => {
        if(confirm("حذف؟")) set(ref(db, 'diaries/' + id), null);
    };

    function renderDiaries() {
        const list = document.getElementById('diaryList');
        list.innerHTML = localDiaries.map(d => `
            <div class="diary-item">
                <small style="color:var(--primary)">${d.date}</small>
                <div style="margin-top:8px; line-height:1.6;">${d.content}</div>
                <div class="diary-actions">
                    <button class="action-btn delete-btn" onclick="deleteDiary(${d.id})">حذف</button>
                </div>
            </div>
        `).join('');
    }

    setInterval(updateUI, 1000);
</script>
</body>
</html>
